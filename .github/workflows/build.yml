name: release

# Triggers:
#   - Push to main branch → nightly build (overwrites 'main' release tag)
#   - Push to release branch → CI checks only (no release triggered)
#   - Commit message matching ^release: vX.X.X on main → stable release
#   - Manual dispatch with version input → stable release

on:
  push:
    branches: [main, release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Stable release version (e.g. v0.1.0). Leave empty for nightly.'
        required: false
        default: ''

permissions:
  contents: write

env:
  ODIN_VERSION: "dev-2026-02"

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Extract release version from commit message or dispatch input
        id: extract
        run: |
          VERSION=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            MSG=$(git log -1 --format='%s')
            if [[ "$MSG" =~ ^release:\ (v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ -n "$VERSION" ]]; then
            echo "Stable release: $VERSION"
          else
            echo "Nightly build"
          fi

  build:
    needs: check-release
    if: always()
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            ext: ""
            odin_file: "odin-linux-amd64-dev-2026-02.tar.gz"
            compress: true
          - os: macos-latest
            target: macos-arm64
            ext: ""
            odin_file: "odin-macos-arm64-dev-2026-02.tar.gz"
            compress: false
          - os: windows-latest
            target: windows-amd64
            ext: ".exe"
            odin_file: "odin-windows-amd64-dev-2026-02.zip"
            compress: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install upx
        if: matrix.compress
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install upx -y
          else
            sudo apt-get update && sudo apt-get install -y upx
          fi

      - name: Install Odin
        shell: bash
        run: |
          mkdir -p odin-sdk
          curl -fsSL "https://github.com/odin-lang/Odin/releases/download/${{ env.ODIN_VERSION }}/${{ matrix.odin_file }}" -o "${{ matrix.odin_file }}"
          if [[ "${{ matrix.odin_file }}" == *.zip ]]; then
            unzip "${{ matrix.odin_file }}" -d odin-sdk
          else
            tar -xzf "${{ matrix.odin_file }}" -C odin-sdk
          fi
          ODIN_DIR=$(find odin-sdk -type f -name odin -o -name odin.exe | head -1 | xargs dirname)
          echo "$ODIN_DIR" >> "$GITHUB_PATH"

      - name: Build and compress
        shell: bash
        run: |
          if [[ "${{ matrix.compress }}" == "true" ]]; then
            just release
          else
            just build
            if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
              codesign -s - ./bin/shard
            fi
          fi

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            cp ./bin/shard.exe dist/
            cd dist
            7z a ../shard-${{ matrix.target }}.zip shard.exe
          else
            cp ./bin/shard dist/
            cd dist
            tar czf ../shard-${{ matrix.target }}.tar.gz shard
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: shard-${{ matrix.target }}
          path: shard-${{ matrix.target }}.*

  # ── Nightly Release ───────────────────────────────────────────
  publish-nightly:
    needs: [check-release, build]
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.version == '' && github.ref == 'refs/heads/main'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main
          name: "Nightly"
          prerelease: true
          generate_release_notes: false
          files: release-assets/*

  # ── Stable Release ────────────────────────────────────────────
  stable-release:
    needs: [check-release, build]
    runs-on: ubuntu-latest
    if: needs.check-release.outputs.version != ''
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into release branch and tag
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          git fetch origin
          # Create or reset release branch to main, then push
          # Use --force only if release branch exists and has diverged
          git checkout -B release origin/main
          git push origin release --force-with-lease 2>/dev/null || git push origin release --force
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.version }}
          name: ${{ needs.check-release.outputs.version }}
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
