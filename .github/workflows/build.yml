name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        # We'll build the release version (optimized for size)
    steps:
    - uses: actions/checkout@v4

    - name: Install Odin
      run: |
        # Determine the OS and architecture
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          ODIN_OS="windows"
          ODIN_ARCH="amd64"
          ODIN_EXT="zip"
        elif [[ "$RUNNER_OS" == "Linux" ]]; then
          ODIN_OS="linux"
          ODIN_ARCH="amd64"
          ODIN_EXT="tar.gz"
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          ODIN_OS="darwin"
          ODIN_ARCH="amd64"
          ODIN_EXT="tar.gz"
        fi

        # Download and extract Odin nightly
        ODIN_URL="https://github.com/odin-lang/Odin/releases/download/nightly/Odin-${ODIN_OS}-${ODIN_ARCH}.${ODIN_EXT}"
        echo "Downloading Odin from $ODIN_URL"
        curl -L -o odin.$ODIN_EXT $ODIN_URL
        if [[ "$ODIN_EXT" == "zip" ]]; then
          unzip -o odin.$ODIN_EXT
        else
          tar -xzf odin.$ODIN_EXT
        fi
        # Add Odin to PATH
        echo "$(pwd)/Odin-${ODIN_OS}-${ODIN_ARCH}" >> $GITHUB_PATH
        # Verify installation
        odin version

    - name: Install just and upx
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          scoop install just upx
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          brew install just upx
        else
          # Linux
          curl -fsSL https://github.com/casey/just/releases/download/1.34.0/just-x86_64-unknown-linux-musl.tar.gz | tar -xz
          sudo mv just /usr/local/bin/
          # Install UPX
          curl -fsSL https://github.com/upx/upx/releases/download/v4.2.2/upx-4.2.2-amd64_linux.tar.xz | tar -xJ
          sudo mv upx-4.2.2-amd64_linux/upx /usr/local/bin/
          just --version
          upx --version
        fi

    - name: Test
      run: just test

    - name: Build release
      run: just release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: shard-${{ runner.os }}
        path: shard*