name: release

# Cross-platform CI build: compiles tree-sitter DLLs, builds shard release
# binary, compresses with UPX, and uploads to a GitHub Release.
#
# Triggers:
#   - Push to main branch (CI build)
#   - Push of a version tag (e.g. v0.1.0) - creates release
#   - Manual dispatch

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  ODIN_VERSION: "dev-2026-02"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            ext: ""
            odin_file: "odin-linux-amd64-dev-2026-02.tar.gz"
          - os: macos-latest
            target: macos-arm64
            ext: ""
            odin_file: "odin-macos-arm64-dev-2026-02.tar.gz"
          - os: windows-latest
            target: windows-amd64
            ext: ".exe"
            odin_file: "odin-windows-amd64-dev-2026-02.zip"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install upx
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install upx
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install upx -y
          else
            sudo apt-get update && sudo apt-get install -y upx
          fi

      - name: Install Odin
        shell: bash
        run: |
          mkdir -p odin-sdk
          curl -fsSL "https://github.com/odin-lang/Odin/releases/download/${{ env.ODIN_VERSION }}/${{ matrix.odin_file }}" -o "${{ matrix.odin_file }}"
          if [[ "${{ matrix.odin_file }}" == *.zip ]]; then
            unzip "${{ matrix.odin_file }}" -d odin-sdk
          else
            tar -xzf "${{ matrix.odin_file }}" -C odin-sdk
          fi
          ODIN_DIR=$(find odin-sdk -type f -name odin -o -name odin.exe | head -1 | xargs dirname)
          echo "$ODIN_DIR" >> "$GITHUB_PATH"

      - name: Build and compress
        shell: bash
        run: just release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == windows-* ]]; then
            cp ./bin/shard.exe dist/
            cd dist
            7z a ../shard-${{ matrix.target }}.zip shard.exe
          else
            cp ./bin/shard dist/
            cd dist
            tar czf ../shard-${{ matrix.target }}.tar.gz shard
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: shard-${{ matrix.target }}
          path: shard-${{ matrix.target }}.*

  # ── GitHub Release ───────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
