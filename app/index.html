<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shard v3-cyl-001</title>
  <link rel="stylesheet" href="/src/style.scss">
</head>

<body>

  <canvas id="c"></canvas>
  <div id="no-webgpu">WebGPU is not supported in this browser.<br>Try Chrome 113+ or Edge 113+.</div>

  <div id="search-overlay">
    <div id="search-box">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M16 16l4.5 4.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search-input" placeholder="Search topics..." autocomplete="off" spellcheck="false">
    </div>
    <div id="search-status"></div>
  </div>


  <div id="detail-panel">
    <div class="panel-header">
      <h2 id="detail-title">Node</h2>
      <button id="detail-close"><svg viewBox="0 0 24 24">
          <path d="M18 6L6 18M6 6l12 12" />
        </svg></button>
    </div>
    <div class="panel-body" id="detail-body"></div>
  </div>

  <div id="edge-zone"></div>
  <div id="settings-panel">
    <div class="panel-header">
      <h2>Settings</h2>
    </div>
    <div class="panel-body">

      <div class="settings-section open" data-section="display">
        <div class="section-header">Display <svg class="chevron" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="section-body">
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Focus</span><span class="setting-value" data-for="focus"></span></div>
            <input type="range" id="focus" min="0" max="1" step="0.01" value="0.6"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Depth</span><span class="setting-value" data-for="depth"></span></div>
            <input type="range" id="depth" min="0" max="1" step="0.005" value="1"></div>
<div class="setting-item"><div class="setting-head"><span class="setting-name">Node Size</span><span class="setting-value" data-for="s-node-size"></span></div>
            <input type="range" id="s-node-size" min="0" max="1" step="0.01" value="0.16"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Gravity</span><span class="setting-value" data-for="gravity"></span></div>
            <input type="range" id="gravity" min="-1" max="1" step="0.01" value="-0.57"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Spread</span><span class="setting-value" data-for="spread"></span></div>
            <input type="range" id="spread" min="0" max="1" step="0.01" value="0.15"></div>
        </div>
      </div>

      <div class="settings-section open" data-section="lines">
        <div class="section-header">Lines <svg class="chevron" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="section-body">
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Width</span><span class="setting-value" data-for="lineWidth"></span></div>
            <input type="range" id="lineWidth" min="0" max="1" step="0.01" value="0.76"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Curvature</span><span class="setting-value" data-for="curvature"></span></div>
            <input type="range" id="curvature" min="0" max="1" step="0.01" value="0.49"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Movement</span><span class="setting-value" data-for="movement"></span></div>
            <input type="range" id="movement" min="0" max="1" step="0.01" value="0.23"></div>
          <div id="color-sliders"></div>
        </div>
      </div>

      <div class="settings-section open" data-section="effects">
        <div class="section-header">Effects <svg class="chevron" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="section-body">
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Strength</span><span class="setting-value" data-for="crt-strength"></span></div>
            <input type="range" id="crt-strength" min="0" max="1" step="0.01" value="0.86"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Scanlines</span><span class="setting-value" data-for="scanlines"></span></div>
            <input type="range" id="scanlines" min="0" max="1" step="0.01" value="0.8"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Bloom</span><span class="setting-value" data-for="bloom"></span></div>
            <input type="range" id="bloom" min="0" max="1" step="0.01" value="0.54"></div>
          <div class="setting-item"><div class="setting-head"><span class="setting-name">Ghosting</span><span class="setting-value" data-for="trail"></span></div>
            <input type="range" id="trail" min="0" max="1" step="0.01" value="0.7"></div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
